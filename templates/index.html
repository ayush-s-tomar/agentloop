<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AgentLoop — Research Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface-2: #1c2333;
    --border:    #21262d;
    --border-2:  #30363d;
    --text:      #e6edf3;
    --text-2:    #8b949e;
    --text-3:    #484f58;
    --amber:     #d29922;
    --amber-dim: #272012;
    --green:     #3fb950;
    --green-dim: #0f2d17;
    --red:       #f85149;
    --blue:      #388bfd;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Inter', system-ui, sans-serif;
    --r:         6px;
  }

  html { font-size: 14px; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .logo {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot { color: var(--amber); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .header-right a {
    font-size: 13px;
    color: var(--text-2);
    text-decoration: none;
    transition: color .15s;
  }
  .header-right a:hover { color: var(--text); }
  .tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--amber);
    border: 1px solid var(--amber);
    padding: 2px 8px;
    border-radius: 3px;
    opacity: 0.7;
  }

  /* ── Main ── */
  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Hero ── */
  .hero {
    margin-bottom: 36px;
  }
  .hero-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--amber);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .hero h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -.02em;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: 10px;
  }
  .hero p {
    font-size: 14px;
    color: var(--text-2);
    font-weight: 300;
    max-width: 520px;
  }

  /* ── Pipeline stepper ── */
  .stepper {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 24px;
    overflow-x: auto;
    padding-bottom: 2px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-3);
    white-space: nowrap;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface);
    transition: all .2s ease;
    letter-spacing: .04em;
  }
  .step-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-3);
    transition: all .2s ease;
    flex-shrink: 0;
  }
  .step.active {
    color: var(--bg);
    background: var(--amber);
    border-color: var(--amber);
  }
  .step.active .step-dot { background: var(--bg); }
  .step.done {
    color: var(--green);
    border-color: var(--green);
    background: var(--green-dim);
  }
  .step.done .step-dot { background: var(--green); }
  .connector {
    width: 20px;
    height: 1px;
    background: var(--border-2);
    flex-shrink: 0;
  }

  /* ── Search ── */
  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }
  #topic {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border-2);
    color: var(--text);
    padding: 11px 16px;
    font-family: var(--sans);
    font-size: 14px;
    border-radius: var(--r);
    outline: none;
    transition: border-color .15s;
  }
  #topic::placeholder { color: var(--text-3); }
  #topic:focus { border-color: var(--amber); }
  #runBtn {
    background: var(--amber);
    color: #0d0a02;
    border: none;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    padding: 11px 22px;
    border-radius: var(--r);
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  #runBtn:hover:not(:disabled) { opacity: .85; }
  #runBtn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 16px;
    align-items: start;
  }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }

  /* ── Panel ── */
  .panel {
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
  }
  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .panel-head h2 {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-2);
  }
  .panel-timer {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-3);
  }

  /* ── Trace ── */
  .trace-panel { background: var(--surface); }
  .trace-body {
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 11.5px;
    line-height: 1.7;
    min-height: 380px;
    max-height: 520px;
    overflow-y: auto;
  }
  .trace-empty { color: var(--text-3); font-style: italic; }
  .t-line { margin-bottom: 6px; display: flex; gap: 8px; align-items: baseline; }
  .t-node { color: var(--amber); flex-shrink: 0; }
  .t-msg { color: var(--text-2); }
  .t-sub { padding-left: 24px; }
  .t-sub .t-msg { color: var(--text-3); }
  .t-error .t-node, .t-error .t-msg { color: var(--red); }

  /* ── Report ── */
  .report-panel { background: #13161b; }
  .report-body {
    padding: 24px 28px;
    min-height: 380px;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
  }
  .report-empty { color: var(--text-3); font-style: italic; font-size: 13px; }

  .report-body h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -.01em;
    margin-bottom: 16px;
    color: var(--text);
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .report-body h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--amber);
    margin: 22px 0 8px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: .06em;
    font-size: 11px;
  }
  .report-body p { margin-bottom: 10px; color: #c9d1d9; }
  .report-body ul { padding-left: 18px; margin-bottom: 10px; }
  .report-body li { margin-bottom: 4px; color: #c9d1d9; }
  .report-body a { color: var(--blue); text-decoration: none; }
  .report-body a:hover { text-decoration: underline; }
  .report-body strong { color: var(--text); font-weight: 600; }

  .copy-btn {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-3);
    border: 1px solid var(--border-2);
    background: transparent;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .04em;
  }
  .copy-btn:hover { color: var(--text-2); border-color: var(--text-3); }

  /* ── Error ── */
  #errorBox {
    display: none;
    background: #1a0d0d;
    border: 1px solid #3d1a1a;
    border-radius: var(--r);
    padding: 12px 16px;
    color: var(--red);
    font-size: 13px;
    margin-bottom: 20px;
    font-family: var(--mono);
  }

  /* Scrollbar */
  .trace-body::-webkit-scrollbar { width: 4px; }
  .trace-body::-webkit-scrollbar-track { background: transparent; }
  .trace-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot">◆</span> AgentLoop
  </div>
  <div class="header-right">
    <span class="tag">multi-step agent</span>
    <a href="https://github.com/ayush-s-tomar/agentloop" target="_blank">GitHub</a>
  </div>
</header>

<main>
  <div class="hero">
    <div class="hero-label">Autonomous Research</div>
    <h1>Research any topic in depth</h1>
    <p>Plans sub-questions, searches the web, reflects on gaps, and writes a structured report.</p>
  </div>

  <div class="stepper" id="stepper"></div>

  <div class="search-bar">
    <input id="topic" type="text" placeholder='e.g. "Impact of the EU AI Act on startups"' maxlength="300" autocomplete="off" />
    <button id="runBtn">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Run
    </button>
  </div>

  <div id="errorBox"></div>

  <div class="grid">
    <div class="panel trace-panel">
      <div class="panel-head">
        <h2>Live trace</h2>
        <span class="panel-timer" id="timer"></span>
      </div>
      <div class="trace-body" id="traceBody">
        <div class="trace-empty">Nothing running yet.</div>
      </div>
    </div>

    <div class="panel report-panel">
      <div class="panel-head">
        <h2>Report</h2>
        <button class="copy-btn" id="copyBtn" onclick="copyReport()" style="display:none">copy md</button>
      </div>
      <div class="report-body" id="reportBody">
        <div class="report-empty">The report will appear here once the agent finishes.</div>
      </div>
    </div>
  </div>
</main>

<script>
const STEPS = [
  { key: 'recall',    label: 'recall'     },
  { key: 'planner',   label: 'plan'       },
  { key: 'research',  label: 'research'   },
  { key: 'reflect',   label: 'reflect'    },
  { key: 'synthesize',label: 'synthesize' },
  { key: 'persist',   label: 'save'       },
];

const stepperEl   = document.getElementById('stepper');
const traceBody   = document.getElementById('traceBody');
const reportBody  = document.getElementById('reportBody');
const runBtn      = document.getElementById('runBtn');
const topicInput  = document.getElementById('topic');
const timerEl     = document.getElementById('timer');
const errorBox    = document.getElementById('errorBox');
const copyBtn     = document.getElementById('copyBtn');

let rawReport = '';
let timerInterval = null;
let startTime = null;
let doneSet = new Set();
let activeNode = null;

// ── Stepper ──
function renderStepper() {
  stepperEl.innerHTML = '';
  STEPS.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'step' +
      (s.key === activeNode ? ' active' : '') +
      (doneSet.has(s.key)  ? ' done'   : '');
    el.innerHTML = `<span class="step-dot"></span>${s.label}`;
    stepperEl.appendChild(el);
    if (i < STEPS.length - 1) {
      const c = document.createElement('div');
      c.className = 'connector';
      stepperEl.appendChild(c);
    }
  });
}
renderStepper();

// ── Timer ──
function startTimer() {
  startTime = Date.now();
  timerEl.textContent = '0.0s';
  timerInterval = setInterval(() => {
    timerEl.textContent = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
  }, 100);
}
function stopTimer() { clearInterval(timerInterval); }

// ── Trace ──
function addTrace(node, msg, cls = '') {
  const isSub = msg.trim().startsWith('->');
  const row = document.createElement('div');
  row.className = 't-line' + (isSub ? ' t-sub' : '') + (cls ? ' ' + cls : '');
  if (isSub) {
    row.innerHTML = `<span class="t-msg">${msg}</span>`;
  } else {
    row.innerHTML = `<span class="t-node">${node}</span><span class="t-msg">${msg}</span>`;
  }
  traceBody.appendChild(row);
  traceBody.scrollTop = traceBody.scrollHeight;
}

// ── Markdown ──
function mdToHtml(md) {
  const lines = md.replace(/\r\n/g, '\n').split('\n');
  let html = '', inList = false;
  const inline = t => t
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\[(.+?)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) { if (inList) { html += '</ul>'; inList = false; } continue; }
    if (line.startsWith('# '))  { if (inList) { html += '</ul>'; inList = false; } html += `<h1>${inline(line.slice(2))}</h1>`; continue; }
    if (line.startsWith('## ')) { if (inList) { html += '</ul>'; inList = false; } html += `<h2>${inline(line.slice(3))}</h2>`; continue; }
    if (line.startsWith('- ') || line.startsWith('* ')) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${inline(line.slice(2))}</li>`;
      continue;
    }
    if (inList) { html += '</ul>'; inList = false; }
    html += `<p>${inline(line)}</p>`;
  }
  if (inList) html += '</ul>';
  return html;
}

// ── Copy ──
function copyReport() {
  if (!rawReport) return;
  navigator.clipboard.writeText(rawReport).then(() => {
    copyBtn.textContent = 'copied ✓';
    setTimeout(() => { copyBtn.textContent = 'copy md'; }, 2000);
  });
}

// ── Reset ──
function reset() {
  doneSet = new Set();
  activeNode = null;
  renderStepper();
  traceBody.innerHTML = '';
  reportBody.innerHTML = '<div class="report-empty">The report will appear here once the agent finishes.</div>';
  errorBox.style.display = 'none';
  copyBtn.style.display = 'none';
  rawReport = '';
  timerEl.textContent = '';
  stopTimer();
}

function showError(msg) {
  stopTimer();
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
  runBtn.disabled = false;
  runBtn.textContent = 'Run';
}

// ── Main research flow (SSE) ──
async function startResearch() {
  const topic = topicInput.value.trim();
  if (!topic) { topicInput.focus(); return; }

  reset();
  runBtn.disabled = true;
  runBtn.textContent = 'Running…';
  startTimer();

  try {
    const resp = await fetch('/research', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: 'Request failed.' }));
      showError(err.detail || 'Request failed.');
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let ev;
        try { ev = JSON.parse(line.slice(6)); } catch { continue; }

        if (ev.node === '__error__') { showError(ev.message); return; }

        if (ev.node === '__done__') {
          stopTimer();
          if (activeNode) { doneSet.add(activeNode); activeNode = null; }
          renderStepper();

          rawReport = ev.report || '';
          if (rawReport) {
            reportBody.innerHTML = mdToHtml(rawReport);
            copyBtn.style.display = 'block';
          }
          runBtn.disabled = false;
          runBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> Run`;
          return;
        }

        // Complete previous node
        if (activeNode && activeNode !== ev.node) {
          doneSet.add(activeNode);
        }
        activeNode = ev.node;
        renderStepper();

        // Trace line
        addTrace(ev.node, ev.label || ev.node);

        if (ev.sub_questions?.length) {
          ev.sub_questions.forEach(q => addTrace(ev.node, `→ ${q}`));
        }
        if (ev.reflection) {
          addTrace(ev.node, `→ ${ev.reflection}`);
        }
      }
    }
  } catch (err) {
    showError('Network error — is the server running?');
  }
}

runBtn.addEventListener('click', startResearch);
topicInput.addEventListener('keydown', e => { if (e.key === 'Enter') startResearch(); });
</script>
</body>
</html>
